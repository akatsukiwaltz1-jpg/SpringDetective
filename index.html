<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spring Detective</title>
<style>
  /* ===== RESET & SCREEN SETUP ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

  /* ===== HIDE SUGARCUBE DEFAULT UI ===== */
  #ui-bar, #ui-bar-toggle, #ui-bar-history, .passage-header { display: none !important; }
  #story { margin-left: 0 !important; }
  #passages { max-width: 100% !important; padding: 0 !important; }
  .passage { font-family: 'Noto Sans JP', 'Sawarabi Mincho', sans-serif; color: #fff; }

  /* ===== FULLSCREEN PASSAGE CONTAINER ===== */
  .passage { 
    display: flex; flex-direction: column; 
    justify-content: center; align-items: center; 
    width: 100vw; height: 100vh; 
    text-align: center; background: #000;
  }

  /* ===== TITLE TEXT ===== */
  .title-text { 
    font-size: clamp(1rem, 3.5vw, 1.6rem); 
    line-height: 2.4; letter-spacing: 0.08em; 
    color: #e8e0d4; opacity: 0;
    animation: fadeInText 3s ease-out forwards;
  }
  @keyframes fadeInText {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== SAKURA BUTTON ===== */
  .sakura-btn { 
    margin-top: 3rem; font-size: 2.8rem; 
    background: none; border: none; cursor: pointer; 
    opacity: 0; animation: fadeInText 2s 2.5s ease-out forwards;
    transition: transform 0.3s, filter 0.3s;
    filter: drop-shadow(0 0 6px rgba(255,183,197,0.5));
  }
  .sakura-btn:hover { transform: scale(1.25) rotate(15deg); filter: drop-shadow(0 0 18px rgba(255,183,197,0.9)); }

  /* ===== CLICK RIPPLE ===== */
  .sakura-ripple {
    position: fixed; pointer-events: none; z-index: 9999;
  }
  .sakura-ripple span {
    position: absolute; font-size: 1.4rem; opacity: 1;
    animation: petal-burst 1s ease-out forwards;
  }
  @keyframes petal-burst {
    0%   { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(0.3); }
  }

  /* ===== FALLING PETALS BACKGROUND ===== */
  .petal {
    position: fixed; top: -40px; font-size: 1.2rem; opacity: 0.45;
    pointer-events: none; z-index: 0;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.45; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }

  /* ===== LANDSCAPE LOCK HINT (portrait phone) ===== */
  @media (orientation: portrait) and (max-width: 600px) {
    body::after {
      content: '📱 โปรดหมุนหน้าจอเป็นแนวนอน';
      position: fixed; inset: 0; z-index: 99999;
      display: flex; justify-content: center; align-items: center;
      background: #000; color: #e8e0d4; font-size: 1.2rem;
      font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.05em;
    }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">

<!-- SugarCube 2 from CDN -->
<script src="https://cdn.jsdelivr.net/gh/tmedwards/sugarcube-2/format/js/sugarcube.min.js"></script>
</head>
<body>

<!-- ==================== TWINE STORY DATA ==================== -->
<tw-storydata name="Spring Detective" startnode="1" creator="Twee" format="SugarCube" format-version="2.37.3">

<tw-passagedata pid="1" name="Start" tags="">
<div class="title-text">
เมษายน<br>
วันโปรโมทชมรมประจำปี<br><br>
สายลมเอื่อยของฤดูใบไม้ผลิ<br>
พัดพาเอาความคึกคักมาสู่โรงเรียนมาโฮชิกิ
</div>

<button class="sakura-btn" id="sakura-btn" onclick="sakuraClick(event)">🌸</button>
</tw-passagedata>

<tw-passagedata pid="2" name="passage2" tags="">
<!-- PASSAGE 2 - TODO -->
<div class="title-text">[ passage2 ]</div>
</tw-passagedata>

</tw-storydata>

<script>
/* ===== BGM ===== */
document.addEventListener('click', function startBGM() {
  const bgm = new Audio('https://files.catbox.moe/guomee.mp3');
  bgm.loop = true; bgm.volume = 0.5; bgm.play();
  document.removeEventListener('click', startBGM);
}, { once: true });

/* ===== SAKURA CLICK EFFECT ===== */
function sakuraClick(e) {
  const ripple = document.createElement('div');
  ripple.className = 'sakura-ripple';
  ripple.style.left = e.clientX + 'px';
  ripple.style.top = e.clientY + 'px';

  for (let i = 0; i < 12; i++) {
    const petal = document.createElement('span');
    const angle = (360 / 12) * i;
    const dist = 40 + Math.random() * 60;
    petal.textContent = '🌸';
    petal.style.setProperty('--tx', Math.cos(angle * Math.PI / 180) * dist + 'px');
    petal.style.setProperty('--ty', Math.sin(angle * Math.PI / 180) * dist + 'px');
    petal.style.setProperty('--tr', (Math.random() * 360) + 'deg');
    ripple.appendChild(petal);
  }

  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 1200);
  setTimeout(() => { SugarCube.Engine.play('passage2'); }, 900);
}

/* ===== FALLING PETALS ===== */
function spawnPetals() {
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = '🌸';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = 6 + Math.random() * 6 + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 12000);
  }, 800);
}
document.addEventListener('DOMContentLoaded', spawnPetals);
</script>

</body>
</html>
